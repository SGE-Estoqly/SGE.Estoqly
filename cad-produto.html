<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Cadastrar Produto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }
        .form-grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
        }
        .label-opcional {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: normal;
            margin-left: 0.3rem;
        }

        /* --- ESTILIZAÇÃO DO MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #1e293b; border: 1px solid #334155; padding: 2rem;
            border-radius: 12px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            transform: scale(0.9); transition: transform 0.3s ease; color: #f8fafc;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
        .modal-icon.success { color: #10b981; }
        .modal-icon.danger { color: #ef4444; }
        .modal-icon.warning { color: #f59e0b; }
        .modal-btn {
            padding: 0.6rem 1.5rem; font-size: 1rem; font-weight: 500; cursor: pointer;
            border: none; border-radius: 6px; color: white; width: 100%; margin-top: 1.5rem;
            transition: background 0.2s; background-color: #3b82f6;
        }
        .modal-btn:hover { background-color: #2563eb; }
    </style>
</head>
<body>
    <div id="app-container">
        <sidebar>
            <div class="sidebar-brand">
                <img src="logo.png" class="logo-sistema" alt="Logo">
                <span>SGE Estoqly</span>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li class="sidebar-item"><a href="fornecedores.html"><i class="fa-solid fa-truck"></i> Consultar Fornecedor</a></li>
                <li class="sidebar-item"><a href="cad-produto.html"><i class="fa-solid fa-box"></i> Cadastrar Produto</a></li>
                <li class="sidebar-item"><a href="produtos.html"><i class="fa-solid fa-box"></i> Consultar Produtos</a></li>                            
                <li class="sidebar-item"><a href="ent-produto.html"><i class="fa-solid fa-circle-arrow-down"></i> Entrada de Estoque</a></li>
                <li class="sidebar-item"><a href="sai-produto.html"><i class="fa-solid fa-circle-arrow-up"></i> Saída de Estoque</a></li>
                <li class="sidebar-item"><a href="cad-pedidos.html"><i class="fa-solid fa-file-invoice-dollar"></i> Novo Pedido</a></li>
                <li class="sidebar-item"><a href="pedidos.html"><i class="fa-solid fa-list-check"></i> Gerenciar Pedidos</a></li>
                <li class="sidebar-item active"><a href="movimentacoes.html"><i class="fa-solid fa-clock-rotate-left"></i> Movimentações</a></li>
                <li class="sidebar-item"><a href="exclusoes.html"><i class="fa-solid fa-trash-can"></i> Histórico de Exclusões</a></li> </ul>
            </ul>
            <div class="sidebar-status-plano">
                <i id="statusPlanoIcone" class="fa-solid fa-circle-check"></i>
                <span>Plano: <strong id="statusPlanoTexto">Verificando...</strong></span>
            </div>
            <div class="sidebar-item logout-btn"><a onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</a></div>
        </sidebar>

        <main>
            <h2>Cadastrar Novo Produto</h2>
            
            <div class="card-form">
                <form id="form-cad-produto">
                    <div class="form-group">
                        <label for="prod-nome"><i class="fa-solid fa-tag"></i> Nome do Produto</label>
                        <input type="text" id="prod-nome" class="form-control" placeholder="Ex: Sabão Líquido Omo 3L" required>
                    </div>

                    <div class="form-group">
                        <label for="prod-fornecedor"><i class="fa-solid fa-truck"></i> Fornecedor Padrão</label>
                        <select id="prod-fornecedor" class="form-control" required>
                            <option value="">Carregando fornecedores...</option>
                        </select>
                    </div>

                    <div class="form-grid-3">
                        <div class="form-group">
                            <label for="prod-preco"><i class=""></i> Preço (R$)</label>
                            <input type="number" id="prod-preco" class="form-control" step="0.01" min="0" placeholder="0,00" required>
                        </div>
                        <div class="form-group">
                            <label for="prod-estoque"><i class="fa-solid fa-boxes-stacked"></i> Qtd. Inicial</label>
                            <input type="number" id="prod-estoque" class="form-control" min="0" placeholder="0" required>
                        </div>
                        <div class="form-group">
                            <label for="prod-min"><i class="fa-solid fa-triangle-exclamation"></i> Qtd. Mínima</label>
                            <input type="number" id="prod-min" class="form-control" min="0" placeholder="5" value="5" required>
                        </div>
                    </div>

                    <div class="form-grid-2" style="background: #151f32; padding: 1rem; border-radius: 8px; border: 1px dashed #334155; margin-bottom: 1.5rem;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="prod-lote"><i class="fa-solid fa-barcode"></i> Lote Inicial <span class="label-opcional">(Opcional)</span></label>
                            <input type="text" id="prod-lote" class="form-control" placeholder="Ex: LT-2026/A">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="prod-validade"><i class="fa-solid fa-calendar-days"></i> Validade <span class="label-opcional">(Opcional)</span></label>
                            <input type="date" id="prod-validade" class="form-control">
                        </div>
                    </div>
                    <div class="form-footer">
                        <button type="submit" id="btn-save-supplier" class="btn"><i class="fa-solid fa-floppy-disk"></i>Salvar Produto</button>
                    </div>
                    
                </form>
            </div>
        </main>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <span id="modal-icon" class="modal-icon"></span>
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
            <button type="button" id="modal-btn-close" class="modal-btn">Ok</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let modalCallback = null;

        function chamarModal(titulo, mensagem, tipo = 'success', callback = null) {
            const modal = document.getElementById('custom-modal');
            const iconEl = document.getElementById('modal-icon');
            document.getElementById('modal-title').innerText = titulo;
            document.getElementById('modal-message').innerText = mensagem;
            modalCallback = callback;

            iconEl.className = 'modal-icon';
            if (tipo === 'success') { iconEl.innerHTML = '<i class="fa-solid fa-circle-check"></i>'; iconEl.classList.add('success'); }
            else if (tipo === 'danger') { iconEl.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>'; iconEl.classList.add('danger'); }
            else { iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; iconEl.classList.add('warning'); }

            modal.classList.add('active');
        }

        document.getElementById('modal-btn-close').addEventListener('click', () => {
            document.getElementById('custom-modal').classList.remove('active');
            if (modalCallback) {
                const acao = modalCallback;
                modalCallback = null;
                acao();
            }
        });

        // 🔄 BUSCA OS FORNECEDORES CADASTRADOS ASSIM QUE A TELA ABRE
        document.addEventListener("DOMContentLoaded", async function() {
            const spreadsheetId = localStorage.getItem('sge_spreadsheet_id');
            if (!spreadsheetId) return;

            try {
                const response = await db.call({
                    action: "getDropdownData",
                    spreadsheetId: spreadsheetId
                });

                if (response && response.success) {
                    const selectForn = document.getElementById('prod-fornecedor');
                    selectForn.innerHTML = '<option value="">Selecione o Fornecedor</option>';
                    
                    if(response.fornecedores && response.fornecedores.length > 0) {
                        response.fornecedores.forEach(forn => {
                            selectForn.innerHTML += `<option value="${forn}">${forn}</option>`;
                        });
                    } else {
                        selectForn.innerHTML = '<option value="Sem Fornecedor">Nenhum fornecedor cadastrado</option>';
                    }
                }
            } catch (error) {
                console.error("Erro ao carregar lista de fornecedores:", error);
                document.getElementById('prod-fornecedor').innerHTML = '<option value="">Erro ao carregar</option>';
            }

            // --- VALIDAÇÃO DE ASSINATURA ---
            function forçarLogout() { localStorage.clear(); window.location.href = 'index.html'; }
            let statusAtual = localStorage.getItem('sge_plano_status') || 'Inativo';
            
            const elementoTexto = document.getElementById('statusPlanoTexto');
            const elementoIcone = document.getElementById('statusPlanoIcone');
            if (elementoTexto && elementoIcone) {
                if (statusAtual.toLowerCase() === 'ativo') {
                    elementoTexto.textContent = 'Ativo'; elementoTexto.className = 'status-ativo';
                    elementoIcone.className = 'fa-solid fa-circle-check status-ativo';
                } else {
                    elementoTexto.textContent = 'Inativo'; elementoTexto.className = 'status-inativo';
                    elementoIcone.className = 'fa-solid fa-circle-xmark status-inativo';
                }
            }
            if (statusAtual.toLowerCase() !== 'ativo') { forçarLogout(); return; }
        });

// ENVIO DOS DADOS ALINHADOS COM A PLANILHA
        document.getElementById('form-cad-produto').addEventListener('submit', async function(e) {
            e.preventDefault();

            // 💡 Captura o botão de salvar deste formulário dinamicamente e salva o estado original
            const btn = e.target.querySelector('button[type="submit"]');
            let originalBtnHTML = "";
            
            if (btn) {
                originalBtnHTML = btn.innerHTML; // Salva o texto/ícone original
                btn.disabled = true;             // Desabilita o botão
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...'; // Efeito de carregamento
            }

            const nome = document.getElementById('prod-nome').value.trim();
            const fornecedor = document.getElementById('prod-fornecedor').value;
            const preco = parseFloat(document.getElementById('prod-preco').value);
            const estoque = parseInt(document.getElementById('prod-estoque').value);
            const min = parseInt(document.getElementById('prod-min').value) || 0;
            const lote = document.getElementById('prod-lote').value.trim();
            const validade = document.getElementById('prod-validade').value;

            const spreadsheetId = localStorage.getItem('sge_spreadsheet_id');
            if (!spreadsheetId) {
                chamarModal('Erro', 'Banco de dados não configurado. Faça login novamente.', 'danger');
                // Reabilita se faltar configuração
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = originalBtnHTML;
                }
                return;
            }

            const idGerado = 'P' + Date.now();

            try {
                const response = await db.call({
                    action: "saveProduct", 
                    spreadsheetId: spreadsheetId,
                    id: idGerado,
                    nome: nome,
                    fornecedor: fornecedor,
                    preco: preco,
                    estoque: estoque,
                    min: min,
                    lote: lote,          
                    vencimento: validade 
                });

                if (response && response.success) {
                    chamarModal('Sucesso!', 'Produto cadastrado com o ID: ' + idGerado, 'success', () => {
                        document.getElementById('form-cad-produto').reset();
                        document.getElementById('prod-min').value = "5";
                        
                        // 💡 Restaura o botão ao fechar o modal de sucesso
                        if (btn) {
                            btn.disabled = false;
                            btn.innerHTML = originalBtnHTML;
                        }
                    });
                } else {
                    chamarModal('Erro', response.message || 'Não foi possível cadastrar o produto.', 'danger');
                    // Reabilita em caso de erro retornado pelo servidor
                    if (btn) {
                        btn.disabled = false;
                        btn.innerHTML = originalBtnHTML;
                    }
                }
            } catch (error) {
                chamarModal('Erro', 'Falha na comunicação com o servidor de banco de dados.', 'danger');
                console.error(error);
                // Reabilita em caso de falha de conexão/script
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = originalBtnHTML;
                }
            }
        });
    </script>
</body>
</html>
